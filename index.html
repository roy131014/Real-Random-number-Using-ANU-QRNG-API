<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Quantum Random</title>
</head>

<body>

<h3>양자 난수:</h3>
<div id="output">불러오는 중...</div>
<br>
<button onclick="get()">다시 뽑기</button>

<script>
const API_URL = "test.changhyun2013.workers.dev";

async function get() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        document.getElementById("output").textContent =
            data.data.join(', ');

    } catch (e) {
        document.getElementById("output").textContent =
            "로딩 실패";
    }
}

get();
</script>

</body>
</html>
