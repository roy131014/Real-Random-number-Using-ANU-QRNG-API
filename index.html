<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Quantum Random</title>
</head>

<body>

<h3>양자 난수:</h3>
<div id="output">불러오는 중...</div>
<br>
<button onclick="get()">다시 뽑기</button>

<script>
const API_URL = "https://test.changhyun2013.workers.dev";

async function get() {
    try {
        const res = await fetch(API_URL);

        if (!res.ok) {
            throw new Error("네트워크 오류");
        }

        const data = await res.json();

        // data.data가 배열인지 확인
        if (data && Array.isArray(data.data)) {
            document.getElementById("output").textContent =
                data.data.join(', ');
        } else {
            document.getElementById("output").textContent =
                "데이터 형식 오류";
        }

    } catch (e) {
        document.getElementById("output").textContent =
            "로딩 실패";
        console.error(e);
    }
}

get();
</script>

</body>
</html>
